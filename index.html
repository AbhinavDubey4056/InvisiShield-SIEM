<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel SIEM - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body {
    background-color: #020617; 
    background-image: 
        linear-gradient(to right, rgba(30, 41, 59, 0.2) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(30, 41, 59, 0.2) 1px, transparent 1px);
    background-size: 40px 40px; 
    color: #e2e8f0;
    font-family: 'ui-monospace', 'Cascadia Code', monospace;
}
.bg-slate-800 {
    background-color: rgba(30, 41, 59, 0.7) !important;
    backdrop-filter: blur(12px); 
    border: 1px solid rgba(255, 255, 255, 0.05) !important;
}</style>
</head>
<body class="p-6 text-sm">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse" id="sys-status"></div>
                <h1 class="text-2xl font-bold text-white">SENTINEL<span class="text-blue-500">SIEM</span></h1>
            </div>
            <div class="flex gap-4 items-center">
                <div class="bg-slate-800 px-4 py-2 rounded shadow text-center border border-slate-700">
                    <p class="text-xs text-slate-400">Employees Online</p>
                    <p class="text-xl font-bold text-emerald-400"><span id="online-users">0</span> <span class="text-sm text-slate-500">/ <span id="total-users">15</span></span></p>
                </div>
                <a href="/admin.html" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold transition">Admin Controls &rarr;</a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 flex flex-col items-center justify-center shadow-lg relative">
                <h3 class="text-xs font-bold text-slate-400 absolute top-3 left-4 uppercase tracking-wider">Auth Success</h3>
                <div class="w-20 h-20 mt-4 relative">
                    <canvas id="authChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="auth-pct" class="text-sm font-bold text-white">0%</span>
                    </div>
                </div>
                <div class="flex gap-3 mt-3 text-[10px] text-slate-400">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Success</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-rose-500"></span> Failed</span>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 flex justify-between items-center shadow-lg">
                <h3 class="text-md font-bold text-purple-400 flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    Company Portal
                </h3>
                <div class="text-right">
                    <span id="app1-alerts" class="text-xl font-bold text-rose-500">0</span>
                    <p class="text-[10px] text-slate-500">ALERTS</p>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 flex justify-between items-center shadow-lg">
                <h3 class="text-md font-bold text-orange-400 flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                    Database System
                </h3>
                <div class="text-right">
                    <span id="app2-alerts" class="text-xl font-bold text-rose-500">0</span>
                    <p class="text-[10px] text-slate-500">ALERTS</p>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 flex justify-between items-center shadow-lg">
                <h3 class="text-md font-bold text-blue-400 flex items-center gap-2">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    GitHub Enterprise
                </h3>
                <div class="text-right">
                    <span id="app3-alerts" class="text-xl font-bold text-rose-500">0</span>
                    <p class="text-[10px] text-slate-500">ALERTS</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-slate-800 rounded-lg p-4 shadow-lg h-[500px] overflow-y-auto">
                <h2 class="text-lg font-semibold mb-4 text-slate-300">Live Traffic Stream</h2>
                <table class="w-full text-left border-collapse">
                    <tbody id="log-table-body"></tbody>
                </table>
            </div>
            <div class="bg-slate-800 rounded-lg p-4 shadow-lg h-[500px] overflow-y-auto">
                <h2 class="text-lg font-semibold mb-4 text-rose-400">Active Threats</h2>
                <div id="alerts-container" class="space-y-3"></div>
            </div>
        </div>

        <div class="mt-8 bg-slate-800 rounded-lg p-5 shadow-lg border border-slate-700/50">
            <h2 class="text-lg font-semibold mb-4 text-slate-200 flex items-center gap-2">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                Organization Cyber Hygiene Leaderboard
            </h2>
            <div id="scorecard-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                </div>
        </div>

    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let authChart; 

        function initChart() {
            const ctx = document.getElementById('authChart').getContext('2d');
            authChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Failed'],
                    datasets: [{
                        data: [1, 0], 
                        backgroundColor: ['#10b981', '#f43f5e'], 
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%', 
                    plugins: { legend: { display: false } } 
                }
            });
        }

        function getAppIcon(appName) {
            if (appName === "Company Portal") return `<svg class="w-3.5 h-3.5 inline mr-1 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>`;
            if (appName === "Database System") return `<svg class="w-3.5 h-3.5 inline mr-1 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>`;
            if (appName === "GitHub Enterprise") return `<svg class="w-3.5 h-3.5 inline mr-1 text-blue-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>`;
            return "";
        }

        async function fetchStats() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                const data = await res.json();
                
                document.getElementById('online-users').innerText = data.online_users;
                document.getElementById('total-users').innerText = data.total_users;
                document.getElementById('app1-alerts').innerText = data.app_stats["Company Portal"].alerts;
                document.getElementById('app2-alerts').innerText = data.app_stats["Database System"].alerts;
                document.getElementById('app3-alerts').innerText = data.app_stats["GitHub Enterprise"].alerts;

                if (authChart && data.auth_stats) {
                    const success = data.auth_stats.success;
                    const failed = data.auth_stats.failed;
                    const total = success + failed;
                    authChart.data.datasets[0].data = [success, failed || 0.01]; 
                    authChart.update();
                    const pct = total > 0 ? Math.round((success / total) * 100) : 0;
                    document.getElementById('auth-pct').innerText = pct + '%';
                }

                document.getElementById('log-table-body').innerHTML = data.recent_logs.map(log => {
                    const icon = getAppIcon(log.app);
                    return `
                    <tr class="border-b border-slate-700/50 ${log.analysis.status === 'anomaly' ? 'text-rose-400 bg-rose-950/20' : 'text-slate-300'}">
                        <td class="py-3 px-2 text-slate-500 text-xs">${new Date(log.timestamp*1000).toLocaleTimeString()}</td>
                        <td class="py-3 px-2 font-semibold">${log.username}</td>
                        <td class="py-3 px-2 flex items-center">${icon} ${log.app}</td>
                        <td class="py-3 px-2 text-xs uppercase opacity-80">${log.action}</td>
                        <td class="py-3 px-2 font-mono text-xs">${log.ip_address}</td>
                    </tr>`;
                }).join('');

                document.getElementById('alerts-container').innerHTML = data.recent_alerts.map(a => {
                    const icon = getAppIcon(a.app);
                    const xai = a.analysis.xai_scores;
                    const xaiBars = Object.keys(xai).map(feature => {
                        const percentage = Math.round(xai[feature] * 100);
                        return `
                            <div class="mb-1">
                                <div class="flex justify-between text-[9px] uppercase mb-0.5 text-slate-500">
                                    <span>${feature}</span>
                                    <span>${percentage}%</span>
                                </div>
                                <div class="w-full bg-slate-800 rounded-full h-1">
                                    <div class="bg-blue-500 h-1 rounded-full" style="width: ${percentage}%"></div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    return `
                    <div class="bg-slate-900 p-4 rounded-xl border border-rose-500/30 shadow-xl log-enter mb-4">
                        <div class="flex justify-between items-start mb-2">
                            <strong class="text-rose-400 text-sm font-bold">${a.username}</strong>
                            <span class="bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">RISK: ${a.analysis.risk_score}%</span>
                        </div>
                        <div class="flex items-center text-slate-400 text-xs mb-3">
                            ${icon} <span class="ml-1">${a.app} • ${a.action}</span>
                        </div>
                        <p class="text-slate-200 text-xs italic bg-slate-800/50 p-2 rounded border-l-2 border-rose-500 mb-4">
                            "${a.analysis.reasons[0]}"
                        </p>
                        <div class="border-t border-slate-800 pt-3">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">AI Feature Attribution</h4>
                            ${xaiBars}
                        </div>
                    </div>`;
                }).join('');

                // NEW: Render the Gamified Scorecards
                if(data.leaderboard) {
                    document.getElementById('scorecard-grid').innerHTML = data.leaderboard.map((user, index) => {
                        let color = 'emerald';
                        if (user.grade === 'B') color = 'blue';
                        if (user.grade === 'C') color = 'orange';
                        if (user.grade === 'F') color = 'rose';

                        return `
                        <div class="bg-slate-900 border border-${color}-500/30 p-3 rounded-lg flex flex-col items-center justify-center relative overflow-hidden group hover:border-${color}-500/60 transition-all">
                            <div class="absolute top-0 left-0 w-full h-1 bg-slate-800">
                                <div class="h-1 bg-${color}-500" style="width: ${user.score}%"></div>
                            </div>
                            <span class="absolute top-2 left-2 text-[10px] text-slate-500 font-bold">#${index + 1}</span>
                            <div class="text-3xl font-black text-${color}-500 my-2 opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-all">${user.grade}</div>
                            <span class="text-xs font-bold text-slate-300 truncate w-full text-center">${user.username}</span>
                            <span class="text-[10px] text-slate-500">Score: ${user.score}/100</span>
                        </div>`;
                    }).join('');
                }
            } catch (error) {
                console.error("Waiting for backend...");
            }
        }

        initChart();
        setInterval(fetchStats, 2000); 
        fetchStats();
    </script>
</body>
</html>
