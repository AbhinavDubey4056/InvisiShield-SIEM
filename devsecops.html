<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel DevSecOps Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617; 
            background-image: 
                linear-gradient(to right, rgba(30, 41, 59, 0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(30, 41, 59, 0.2) 1px, transparent 1px);
            background-size: 40px 40px; 
            color: #e2e8f0;
            font-family: 'ui-monospace', 'Cascadia Code', monospace;
        }
        .bg-slate-800 {
            background-color: rgba(30, 41, 59, 0.7) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6d28d9; }
    </style>
</head>
<body class="p-4 md:p-8 antialiased selection:bg-purple-500/30">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b border-slate-700/60 pb-6 flex justify-between items-end">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <div class="w-2.5 h-2.5 rounded-full bg-purple-500 animate-pulse shadow-[0_0_8px_rgba(168,85,247,0.8)]"></div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-white">SENTINEL<span class="text-purple-500">DEVSECOPS</span></h1>
                </div>
                <p class="text-slate-400 text-sm">Static Application Security Testing (SAST) & GitHub Webhooks</p>
            </div>
            <div class="flex gap-4">
                <a href="/" class="text-sm text-slate-400 hover:text-white transition-colors flex items-center gap-2 border border-slate-700 px-3 py-1.5 rounded-lg hover:bg-slate-800">
                    &larr; Main Dashboard
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700/50 flex justify-between items-center">
                <div>
                    <p class="text-xs text-slate-400 uppercase tracking-wider font-bold mb-1">GitHub Pushes</p>
                    <p id="github-count" class="text-3xl font-black text-white">0</p>
                </div>
                <svg class="w-10 h-10 text-slate-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            </div>
            <div class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700/50 flex justify-between items-center">
                <div>
                    <p class="text-xs text-slate-400 uppercase tracking-wider font-bold mb-1">Code Alerts Detected</p>
                    <p id="code-alerts" class="text-3xl font-black text-rose-500">0</p>
                </div>
                <svg class="w-10 h-10 text-rose-900/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <div class="bg-slate-800 p-5 rounded-xl shadow-lg border border-purple-500/30 flex justify-between items-center">
                <div class="w-full">
                    <p class="text-xs text-purple-400 uppercase tracking-wider font-bold mb-2">Engine Status</p>
                    <div class="flex items-center gap-2">
                        <span class="relative flex h-3 w-3">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                        </span>
                        <span class="text-sm font-bold text-emerald-400">SAST Scanner Active</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-slate-800 rounded-xl shadow-2xl overflow-hidden flex flex-col h-[600px]">
                <div class="p-5 border-b border-slate-700/60 bg-slate-900/50">
                    <h2 class="text-lg font-semibold text-slate-200">Live Code Push Stream</h2>
                </div>
                
                <div class="overflow-y-auto flex-1 p-0">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="sticky top-0 bg-slate-900/90 backdrop-blur z-10 shadow-sm">
                            <tr class="text-[10px] text-slate-400 uppercase tracking-wider">
                                <th class="py-3 px-6 font-semibold">Timestamp</th>
                                <th class="py-3 px-6 font-semibold">Developer</th>
                                <th class="py-3 px-6 font-semibold">Source</th>
                                <th class="py-3 px-6 font-semibold text-right">SAST Status</th>
                            </tr>
                        </thead>
                        <tbody id="sast-table" class="divide-y divide-slate-700/50">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl shadow-2xl overflow-hidden flex flex-col h-[600px] border border-rose-900/30">
                <div class="p-5 border-b border-rose-900/50 bg-gradient-to-r from-rose-950/40 to-slate-800/80">
                    <h2 class="text-lg font-semibold text-rose-400 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        Vulnerability Report
                    </h2>
                </div>
                <div class="p-5 overflow-y-auto flex-1 space-y-4" id="sast-alerts-container">
                </div>
            </div>
        </div>

        <div id="traceback-panel" class="mt-8 bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700/50 hidden">
            <div class="p-4 border-b border-slate-700/60 bg-slate-900/50 flex justify-between items-center">
                <h2 class="text-md font-semibold text-slate-200 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Forensic Action Replay: <span id="traceback-user" class="text-blue-400 font-bold"></span>
                </h2>
                <button onclick="document.getElementById('traceback-panel').classList.add('hidden')" class="text-slate-500 hover:text-white">&times;</button>
            </div>
            <div class="p-6 overflow-x-auto">
                <div class="flex items-center min-w-max space-x-2" id="traceback-timeline">
                    </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        async function fetchSastData() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                const data = await res.json();
                
                const githubLogs = data.app_stats["GitHub Enterprise"]?.logs || 0;
                const githubAlerts = data.app_stats["GitHub Enterprise"]?.alerts || 0;
                document.getElementById('github-count').innerText = githubLogs;
                document.getElementById('code-alerts').innerText = githubAlerts;

                const codeLogs = data.recent_logs.filter(log => 
                    log.app === "GitHub Enterprise" || log.app === "Manual Scanner"
                );

                document.getElementById('sast-table').innerHTML = codeLogs.map(log => {
                    const isThreat = log.analysis.status === 'anomaly';
                    return `
                    <tr class="hover:bg-slate-700/20 transition-colors group ${isThreat ? 'bg-rose-950/10' : ''}">
                        <td class="py-4 px-6 text-slate-500 text-xs">${new Date(log.timestamp*1000).toLocaleTimeString()}</td>
                        <td class="py-4 px-6 font-semibold text-slate-200">${log.username}</td>
                        <td class="py-4 px-6 text-sm text-purple-400 font-bold">${log.app}</td>
                        <td class="py-4 px-6 text-right">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-md text-[10px] font-bold tracking-widest border ${
                                isThreat 
                                ? 'bg-rose-500/10 text-rose-400 border-rose-500/30' 
                                : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30'
                            }">
                                ${isThreat ? 'THREAT FOUND' : 'CLEAN CODE'}
                            </span>
                        </td>
                    </tr>`;
                }).join('') || `<tr class="text-center text-slate-500 text-sm"><td colspan="4" class="py-8">Waiting for code pushes...</td></tr>`;

                const codeAlerts = data.recent_alerts.filter(alert => 
                    alert.app === "GitHub Enterprise" || alert.app === "Manual Scanner"
                );

                // NEW: Replay Traceback Button added inside the Vulnerability Report logic
                document.getElementById('sast-alerts-container').innerHTML = codeAlerts.map(a => {
                    const reasonsHtml = a.analysis.reasons.map((r, index) => {
                        if (index === 0) return `<strong class="text-rose-400 block mb-2 border-b border-rose-900/50 pb-1">${r}</strong>`;
                        return `<div class="bg-black/50 p-2 rounded text-rose-300 font-mono text-[11px] mb-1 border-l-2 border-rose-500">${r}</div>`;
                    }).join('');

                    return `
                    <div class="bg-slate-900 border border-rose-800/50 rounded-lg p-4 shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-rose-600 text-white text-[9px] font-black px-2 py-1 uppercase tracking-widest rounded-bl-lg">Critical</div>
                        <div class="text-xs text-slate-400 mb-3 flex justify-between items-center pr-16">
                            <span>Pushed by: <span class="text-white font-bold">${a.username}</span></span>
                            <span>${new Date(a.timestamp*1000).toLocaleTimeString()}</span>
                        </div>
                        <div class="space-y-1 mb-3">
                            ${reasonsHtml}
                        </div>
                        <button onclick="runTraceback('${a.username}')" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-blue-400 text-xs py-1.5 rounded font-bold transition-colors flex items-center justify-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Replay Traceback
                        </button>
                    </div>`;
                }).join('') || `<div class="text-center text-slate-500 text-sm py-8 italic">No vulnerabilities detected in recent commits.</div>`;

            } catch (err) {
                console.error("Error fetching DevSecOps data", err);
            }
        }

        // NEW: Traceback Replay Function
        async function runTraceback(username) {
            document.getElementById('traceback-panel').classList.remove('hidden');
            document.getElementById('traceback-user').innerText = username;
            const timelineContainer = document.getElementById('traceback-timeline');
            timelineContainer.innerHTML = '<span class="text-slate-500 text-xs animate-pulse">Fetching forensic logs...</span>';

            try {
                const res = await fetch(`${API_URL}/traceback/${username}`);
                const history = await res.json();

                timelineContainer.innerHTML = history.map((log, index) => {
                    const isThreat = log.analysis.status === 'anomaly';
                    const nodeColor = isThreat ? 'bg-rose-500' : 'bg-blue-500';
                    const lineColor = index === history.length - 1 ? 'bg-transparent' : (isThreat ? 'bg-rose-500/50' : 'bg-slate-700');
                    
                    return `
                    <div class="flex items-center">
                        <div class="flex flex-col items-center relative group cursor-pointer w-32">
                            <div class="text-[9px] text-slate-500 mb-2">${new Date(log.timestamp*1000).toLocaleTimeString()}</div>
                            <div class="w-4 h-4 rounded-full ${nodeColor} shadow-[0_0_8px_rgba(59,130,246,0.5)] z-10"></div>
                            <div class="text-[10px] text-slate-300 mt-2 font-bold uppercase truncate w-full text-center px-1">${log.action}</div>
                            
                            <div class="absolute bottom-full mb-2 hidden group-hover:block w-48 bg-slate-900 border border-slate-700 p-2 rounded shadow-2xl z-50 text-left">
                                <p class="text-[10px] text-slate-400">App: <span class="text-white">${log.app}</span></p>
                                <p class="text-[10px] text-slate-400">IP: <span class="font-mono text-white">${log.ip_address}</span></p>
                                <p class="text-[10px] text-slate-400">Geo: <span class="text-white">${log.location}</span></p>
                            </div>
                        </div>
                        <div class="h-0.5 w-12 ${lineColor}"></div>
                    </div>`;
                }).join('');
            } catch (err) {
                timelineContainer.innerHTML = '<span class="text-rose-500 text-xs">Error loading traceback.</span>';
            }
        }

        setInterval(fetchSastData, 2000);
        fetchSastData();
    </script>
</body>
</html>
